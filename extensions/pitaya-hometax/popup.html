<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pitaya 홈택스</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      padding: 16px;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    p.sub { font-size: 11px; color: #94a3b8; margin-bottom: 14px; line-height: 1.5; }
    label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #f1f5f9;
      font-size: 12px;
      margin-bottom: 10px;
    }
    input.code { font-family: monospace; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #0d9488;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #0f766e; }
    .msg {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }
    .msg.ok { display: block; background: #042f2e; color: #5eead4; border: 1px solid #134e4a; }
    .msg.err { display: block; background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .steps { font-size: 10px; color: #64748b; margin-top: 12px; line-height: 1.6; }
    .steps ol { padding-left: 16px; }
  </style>
</head>
<body>
  <h1>Pitaya 홈택스 연결</h1>
  <p class="sub">홈택스에 로그인한 뒤 Pitaya에서 발급한 연결 코드를 입력하세요.</p>

  <label for="apiUrl">Pitaya API 주소</label>
  <input id="apiUrl" type="url" placeholder="https://pitaya-osv1.vercel.app" />

  <label for="linkCode">연결 코드 (6자리)</label>
  <input id="linkCode" class="code" type="text" maxlength="6" placeholder="ABC123" autocomplete="off" />

  <button id="connectBtn" type="button">쿠키 전송 · 연결</button>

  <div id="msg" class="msg"></div>

  <div class="steps">
    <ol>
      <li>Pitaya 설정 → 홈택스 연동 → 연결 코드 발급</li>
      <li>hometax.go.kr 에서 로그인 유지</li>
      <li>위 코드 입력 후 연결</li>
    </ol>
  </div>

  <script src="popup.js"></script>
</body>
</html>
